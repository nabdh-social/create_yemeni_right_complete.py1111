name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install Pillow

      - name: Run Python script to create Flutter project
        run: python create_yemeni_right_complete.py

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: |
          cd my_yemeni_right
          flutter pub get

      - name: Analyze project
        run: |
          cd my_yemeni_right
          flutter analyze || true

      - name: Build APK
        run: |
          cd my_yemeni_right
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: my_yemeni_right/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
